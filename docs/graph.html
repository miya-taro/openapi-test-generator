<!DOCTYPE html>
<html lang="ja">
<head>

  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: #161b22;
      padding: 10px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #header h1 { font-size: 15px; color: #f0f6fc; font-weight: 600; }
    #header-stats { font-size: 12px; color: #8b949e; margin-left: auto; display: flex; gap: 16px; }
    #header-stats span { display: flex; align-items: center; gap: 4px; }

    /* ── Controls ── */
    #controls {
      background: #161b22;
      padding: 8px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .ctrl-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ctrl-label {
      font-size: 10px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      white-space: nowrap;
    }
    #search {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 5px 10px;
      font-size: 12px;
      width: 180px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #58a6ff; }
    #search::placeholder { color: #484f58; }

    .tag-btn {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
    }
    .tag-btn:active { transform: scale(0.95); }
    .tag-btn.off { opacity: 0.3; }

    .layer-config   { background: #1f4e79; border-color: #3498db; color: #74b9ff; }
    .layer-shared   { background: #1a4731; border-color: #27ae60; color: #55efc4; }
    .layer-pipeline { background: #4a2800; border-color: #e67e22; color: #fdcb6e; }
    .layer-rules    { background: #3b1f5e; border-color: #9b59b6; color: #d6a3ff; }
    .layer-test     { background: #4a1010; border-color: #e74c3c; color: #ff7675; }
    .layer-fixture  { background: #2a2a2a; border-color: #636e72; color: #b2bec3; }
    .layer-external { background: #1a1a1a; border-color: #484f58; color: #8b949e; }
    .edge-code-import     { background: #1c1c28; border-color: #6e7681; color: #8b949e; }
    .edge-build-def       { background: #2a2000; border-color: #e67e22; color: #fdcb6e; }
    .edge-config-ref      { background: #001f3f; border-color: #3498db; color: #74b9ff; }

    .ctrl-divider { width: 1px; height: 20px; background: #30363d; }
    .ctrl-btn {
      padding: 4px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: #30363d; }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Key Files Panel (left) ── */
    #keyfiles-panel {
      width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    #keyfiles-header {
      padding: 10px 14px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #keyfiles-header span:first-child {
      font-size: 10px;
      font-weight: 700;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .kf-badge-count {
      background: #f1c40f22;
      color: #f1c40f;
      border: 1px solid #f1c40f44;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
    }
    #keyfiles-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #keyfiles-list::-webkit-scrollbar { width: 4px; }
    #keyfiles-list::-webkit-scrollbar-track { background: #0d1117; }
    #keyfiles-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .kf-item {
      padding: 8px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .kf-item:hover { background: #21262d; border-left-color: #f1c40f; }
    .kf-item.active { background: #21262d; border-left-color: #f1c40f; }
    .kf-item-name {
      font-size: 11px;
      font-weight: 600;
      color: #f0f6fc;
      font-family: 'SFMono-Regular', Consolas, monospace;
      margin-bottom: 3px;
      word-break: break-all;
    }
    .kf-item-role {
      font-size: 10px;
      color: #8b949e;
      margin-bottom: 3px;
    }
    .kf-item-reason {
      font-size: 10px;
      color: #484f58;
      line-height: 1.3;
    }
    .kf-star {
      color: #f1c40f;
      font-size: 10px;
      margin-right: 4px;
    }

    /* ── Network ── */
    #network-wrap {
      flex: 1;
      position: relative;
      background: #0d1117;
      min-width: 0;
    }
    #network { width: 100%; height: 100%; }

    /* ── Detail Panel (right) ── */
    #detail {
      width: 300px;
      background: #161b22;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #detail-header {
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      font-size: 10px;
      font-weight: 700;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      flex-shrink: 0;
    }
    #detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }
    #detail-body::-webkit-scrollbar { width: 4px; }
    #detail-body::-webkit-scrollbar-track { background: #0d1117; }
    #detail-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .detail-empty {
      color: #484f58;
      font-size: 12px;
      text-align: center;
      margin-top: 60px;
      line-height: 1.8;
    }

    .detail-section { margin-bottom: 16px; }
    .detail-section-title {
      font-size: 10px;
      font-weight: 700;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-section-title .cnt { color: #58a6ff; font-weight: 700; }

    .detail-path {
      font-size: 11px;
      color: #f0f6fc;
      word-break: break-all;
      background: #0d1117;
      padding: 7px 9px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-family: 'SFMono-Regular', Consolas, monospace;
      line-height: 1.5;
    }
    .detail-text {
      font-size: 12px;
      color: #c9d1d9;
      line-height: 1.65;
    }
    .detail-code {
      font-size: 11px;
      color: #adbac7;
      background: #0d1117;
      padding: 7px 9px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-family: 'SFMono-Regular', Consolas, monospace;
      line-height: 1.5;
    }
    .detail-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      margin: 2px 2px 2px 0;
    }
    .key-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #f1c40f18;
      border: 1px solid #f1c40f44;
      color: #f1c40f;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .dep-list { list-style: none; }
    .dep-item {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      color: #8b949e;
      font-family: 'SFMono-Regular', Consolas, monospace;
      transition: background 0.1s, color 0.1s;
      word-break: break-all;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .dep-item:hover { background: #21262d; color: #58a6ff; }
    .dep-type-tag {
      font-size: 9px;
      color: #484f58;
      font-family: sans-serif;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .no-deps { font-size: 11px; color: #484f58; font-style: italic; padding: 3px 8px; }

    /* ── Footer ── */
    #footer {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 6px 20px;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #6e7681; }
    .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 18px; height: 2px; flex-shrink: 0; }
    .legend-dashed { background: repeating-linear-gradient(90deg,#3498db 0,#3498db 4px,transparent 4px,transparent 8px); height: 2px; }

</div>

function getLabel(path) {
  return path.split('/').pop();
}

function getShortSummary(path) {
  const kf = KEY_FILES[path];
  if (!kf) return null;
  return kf.summary.split('。')[0] + '。';
}

function buildTooltip(file) {
  const short = getShortSummary(file.path);
  const pathHtml = `<div style="font-family:monospace;font-size:11px;color:#f0f6fc;word-break:break-all;max-width:260px;">${file.path}</div>`;
  if (short) {
    return pathHtml + `<div style="font-size:11px;color:#8b949e;margin-top:5px;max-width:260px;line-height:1.4;">${short}</div>`;
  }
  return pathHtml;
}

const visNodes = DEPS_DATA.files.map(f => {
  const lc = LAYER_CONFIG[f.layer] || LAYER_CONFIG.external;
  const isKey = !!KEY_FILES[f.path];
  const revCount = f.reverse_dependencies.length;
  const size = Math.max(16, Math.min(36, 16 + revCount * 2));

  return {
    id: f.path,
    label: getLabel(f.path),
    title: buildTooltip(f),
    group: f.layer,
    shape: lc.shape,
    size,
    color: {

function applyVisibility(searchQuery) {
  const q = (searchQuery !== undefined ? searchQuery : document.getElementById('search').value).toLowerCase();

  nodesDS.update(visNodes.map(n => {
    const layerHidden = hiddenLayers.has(n._layer);
    const searchFade  = q.length > 0 && !n.id.toLowerCase().includes(q) && !n.label.toLowerCase().includes(q);
    return {
      id: n.id,
      hidden: layerHidden,
      opacity: searchFade ? 0.07 : 1,
      font: { ...n.font, color: searchFade ? '#333' : (n._isKey ? '#f1c40f' : '#f0f6fc') },
    };
  }));

  edgesDS.update(allEdgesData.map(e => {
    const sf = fileMap.get(e.from);
    const st = fileMap.get(e.to);
    return {
      id: e.id,
      hidden: (sf && hiddenLayers.has(sf.layer))
           || (st && hiddenLayers.has(st.layer))
           || hiddenEdgeTypes.has(e._type),
    };
  }));

  updateVisibleStat();
}

document.getElementById('search').addEventListener('input', e => applyVisibility(e.target.value));

  const kf = KEY_FILES[file.path];
  const lc = LAYER_CONFIG[file.layer] || LAYER_CONFIG.external;
  const bs = LAYER_BADGE_STYLE[file.layer] || LAYER_BADGE_STYLE.external;

  let html = '';

  // ★ Key file banner

    html += `<div class="key-badge">★ 主要ファイル</div>`;

  // Path
  html += `
    <div class="detail-section">
      <div class="detail-section-title">PATH</div>
      <div class="detail-path">${file.path}</div>
    </div>`;

  // Attributes
  html += `
    <div class="detail-section">
      <div class="detail-section-title">属性</div>
      <span class="detail-badge" style="${bs}">${file.layer}</span>

  // Summary (key files only)
  if (kf) {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">SUMMARY</div>

      </div>`;

    html += `

      </div>`;

    html += `
      <div class="detail-section">
        <div class="detail-section-title">主要ファイル判定理由</div>
        <div class="detail-text">${kf.reason_important}</div>

  }

  // Direct dependencies
  html += `
    <div class="detail-section">
      <div class="detail-section-title">直接依存 <span class="cnt">${file.direct_dependencies.length}</span></div>
      ${file.direct_dependencies.length === 0
        ? '<div class="no-deps">なし</div>'
        : `<ul class="dep-list">${file.direct_dependencies.map(d =>
            `<li class="dep-item" onclick="selectNode('${esc(d.path)}')">
              <span>${getLabel(d.path)}</span>
              <span class="dep-type-tag">${d.type}</span>
            </li>`).join('')}</ul>`}
    </div>`;

  // Reverse dependencies
  html += `
    <div class="detail-section">
      <div class="detail-section-title">逆依存（参照元） <span class="cnt">${file.reverse_dependencies.length}</span></div>
      ${file.reverse_dependencies.length === 0
        ? '<div class="no-deps">なし</div>'
        : `<ul class="dep-list">${file.reverse_dependencies.map(p =>
            `<li class="dep-item" onclick="selectNode('${esc(p)}')">${getLabel(p)}</li>`
          ).join('')}</ul>`}
    </div>`;

  // Key dependencies / key reverse (key files only)
  if (kf) {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">KEY DEPENDENCIES</div>
        ${kf.key_dependencies.length === 0
          ? '<div class="no-deps">なし</div>'
          : `<ul class="dep-list">${kf.key_dependencies.map(p =>
              `<li class="dep-item" onclick="selectNode('${esc(p)}')">${getLabel(p)}</li>`
            ).join('')}</ul>`}
      </div>`;

    html += `
      <div class="detail-section">
        <div class="detail-section-title">KEY REVERSE DEPENDENCIES</div>
        ${kf.key_reverse_dependencies.length === 0
          ? '<div class="no-deps">なし</div>'
          : `<ul class="dep-list">${kf.key_reverse_dependencies.map(p =>
              `<li class="dep-item" onclick="selectNode('${esc(p)}')">${getLabel(p)}</li>`
            ).join('')}</ul>`}
      </div>`;

    html += `
      <div class="detail-section">
        <div class="detail-section-title">NOTES</div>
        <div class="detail-text">${kf.notes}</div>
      </div>`;
  }

  document.getElementById('detail-body').innerHTML = html;
}

function selectNode(nodeId) {
  if (!fileMap.has(nodeId)) return;
  network.selectNodes([nodeId]);
  network.focus(nodeId, { scale: 1.4, animation: { duration: 400 } });
  renderDetail(fileMap.get(nodeId));
  document.querySelectorAll('.kf-item').forEach(el => {
    el.classList.toggle('active', el.dataset.node === nodeId);
  });
}

function esc(s) { return s.replace(/'/g, "\\'"); }

// ═══════════════════════════════════════════════════════════════════
//  AUTO-FREEZE AFTER STABILIZATION
// ═══════════════════════════════════════════════════════════════════
network.on('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
  physicsOn = false;
  document.getElementById('physics-btn').textContent = '物理演算 ON';
  network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
});
</script>
</body>
</html>
